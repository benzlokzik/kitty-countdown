repos:
  - repo: local
    hooks:
      - id: bun-build-check
        name: bun build check
        entry: bun run check
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: pretty-format-json
        args: ['--indent', '2', '--no-ensure-ascii', '--no-sort-keys']
